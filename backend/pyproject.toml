[project]
name = "flowforge-backend"
version = "0.1.0"
description = "FlowForge AI backend — Requirements Intelligence & Engineering Decision Platform"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic-settings>=2.6",
    "sqlalchemy[asyncio]>=2.0.36",
    "psycopg[binary]>=3.2",
    "alembic>=1.14",
    "pgvector>=0.3.6",
    "gitpython>=3.1",
    "python-multipart>=0.0.32",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "httpx2>=0.28",   # starlette TestClient now prefers httpx2
    "ruff>=0.7",
    "mypy>=1.13",
]

# This is an application, not a library: tell uv not to build/install the
# project itself as a package — just manage its environment.
[tool.uv]
package = false

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic revision files are autogenerated; don't lint their formatting.
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
# E/F: pyflakes+pycodestyle · I: import sorting · UP: pyupgrade
# B: bugbear · SIM: simplify
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
# Put the backend root on sys.path so `import app...` works without installing
# the project as a package.
pythonpath = ["."]
addopts = "-q --tb=short -m 'not network'"
markers = [
    "network: requires real internet access (deselected by default; run with '-m network --run-network')",
]
