name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

jobs:
  lint-test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Set up Python
        run: uv python install

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy (strict typecheck)
        run: uv run mypy app tests

      - name: Pytest
        run: uv run pytest

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
